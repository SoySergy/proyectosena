<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--http://localhost:5031/pages/auth/register.html-->
    <title>RecyRoute</title>
    <!--Favicon-->
    <link rel="icon" href="/assets/icons/recyroute.svg" />
    <!--Styles-->
    <link rel="stylesheet" href="/css/base/styles.css" />
    <link rel="stylesheet" href="/css/pages/auth/password/forgot-password.css" />
</head>
<body>
    <header class="header-secundario">
        <h1 class="recyroute">recyroute</h1>
    </header>

    <main class="auth-wrapper">
        <div class="card">

            <!-- ══════════════════════════════════════════
                 FORMULARIO (visible al entrar)
                 El JS lo oculta con form.style.display = "none"
                 cuando el correo se envía con éxito.
            ══════════════════════════════════════════ -->
            <form id="forgotForm">
                <h1 class="card__title">¿Olvidaste tu contraseña?</h1>
                <br />
                <p class="card__subtitle">
                    Ingresa tu correo y te enviaremos un código de verificación.
                </p>
                <!-- Campo: correo electrónico -->
                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon icon-correo" aria-hidden="true"></span>
                        <input type="email"
                               id="email"
                               class="form-input"
                               placeholder="tucorreo@ejemplo.com"
                               autocomplete="email"
                               required />
                    </div>
                    <!-- Mensaje de error local (lo maneja el JS) -->
                    <p id="emailError" class="form-hint form-hint--error" role="alert" style="display:none;"></p>
                </div>

                <!-- Botón de envío con spinner -->
                <button type="submit" id="submitBtn" class="btn btn-primary btn-login-main">
                    <span id="btnSpinner" class="btn-spinner" style="display:none;" aria-hidden="true"></span>
                    <span id="btnLabel">Enviar código</span>
                </button>

                <!-- Enlace para volver al login -->
                <a href="../login.html" class="form-hint form-hint--link">← Volver al inicio de sesión</a>
            </form>

            <!-- ══════════════════════════════════════════
                 ESTADO DE ÉXITO
                 El JS lo muestra añadiendo la clase "visible"
                 tras enviar el correo correctamente.
            ══════════════════════════════════════════ -->
            <div id="successState" class="success-state">
                <div class="success-state__icon" aria-hidden="true">✉️</div>
                <h2 class="success-state__title">¡Código enviado!</h2>
                <p class="success-state__body">
                    Enviamos un código de 6 dígitos a<br />
                    <strong id="successEmail"></strong>
                </p>
                <p class="success-state__hint">
                    Revisa también tu carpeta de spam.
                </p>
                <!-- Este botón redirige a reset-password.html -->
                <button id="goToVerifyBtn" class="btn btn-primary btn-login-main">
                    Ingresar código
                </button>
                <p class="form-footer">
                    <a href="login.html" class="link">← Volver al inicio de sesión</a>
                </p>
            </div>

        </div>
    </main>
    <script type="module" src="/js/pages/auth/password/forgot-password.js"></script>
</body>
</html>
