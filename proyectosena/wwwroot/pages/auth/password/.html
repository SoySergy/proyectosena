<!DOCTYPE html>
<!--paso 1: Olvidaste tu contraseña-->
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecyRoute – Recuperar contraseña</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- ── Header secundario: solo logo centrado ── -->
    <header class="header-secundario">
        <div class="recyroute">
            <a href="index.html">RecyRoute</a>
        </div>
    </header>

    <!-- ── Contenido principal centrado ── -->
    <main class="page-wrapper">
        <div class="card">

            <!-- Ícono de candado en el logo del card -->
            <div class="card__logo">
                <div class="card__logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
                <span class="card__logo-text">RecyRoute</span>
            </div>

            <!-- Título y descripción -->
            <h1 class="card__title">¿Olvidaste tu contraseña?</h1>
            <p class="card__subtitle">
                Ingresa tu correo y te enviaremos un código de 6 dígitos para recuperarla.
            </p>

            <!-- ── Formulario ── -->
            <form id="forgotForm" novalidate>

                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <div class="form-input-wrapper">
                        <!-- Ícono sobre/email -->
                        <span class="form-input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                        </span>
                        <input type="email"
                               id="email"
                               name="email"
                               class="form-input"
                               placeholder="tucorreo@ejemplo.com"
                               autocomplete="email"
                               required />
                    </div>
                    <!-- Mensaje de error de validación -->
                    <span class="form-hint form-hint--error" id="emailError" style="display:none"></span>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-spinner" id="btnSpinner"></span>
                    <span class="btn-label" id="btnLabel">Enviar código</span>
                </button>
            </form>

            <!-- ── Estado de éxito (se muestra tras enviar) ── -->
            <div class="success-state" id="successState">
                <div class="success-icon">📧</div>
                <p class="success-title">¡Código enviado!</p>
                <p class="success-message">
                    Enviamos un código de verificación a<br>
                    <span class="success-email-highlight" id="successEmail"></span>.<br>
                    Revisa también tu carpeta de spam.
                </p>
                <button class="btn-primary" id="goToVerifyBtn" style="margin-top: 0.5rem;">
                    Ingresar código
                </button>
            </div>

            <!-- ── Footer: volver a login ── -->
            <div class="card__footer">
                <a href="login.html">← Volver a iniciar sesión</a>
            </div>

        </div>
    </main>

    <script type="module" src="forgot-password.js"></script>
</body>
</html>
