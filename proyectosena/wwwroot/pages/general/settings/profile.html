<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyRoute Profile</title>
    <!-- Favicon -->
    <link rel="icon" href="/assets/icons/recyroute.svg" />
    <!-- Base -->
    <link rel="stylesheet" href="/css/base/styles.css">
    <!-- Components -->
    <link rel="stylesheet" href="/css/components/headers/headerusuario.css">
    <link rel="stylesheet" href="/css/components/cards.css">
    <link rel="stylesheet" href="/css/components/form.css">
    <!-- Page -->
    <link rel="stylesheet" href="/css/pages/citizen/dashboard.css">
    <link rel="stylesheet" href="/css/pages/general/settings.css">
</head>
<body>

    <!-- ===== HEADER PRINCIPAL ===== -->
    <header class="header-usuario">
        <h1 class="recyroute">
            recyroute
        </h1>
        <div class="header-user">
            <span id="welcomeMsg" class="header-user__name"></span>
            <div class="header-user__menu">
                <button class="header-user__trigger"
                        id="userMenuTrigger"
                        type="button"
                        aria-haspopup="true"
                        aria-expanded="false">
                    <span class="header-user__avatar" aria-hidden="true">
                        <img src="/assets/icons/usuario.svg" alt="" />
                    </span>
                </button>
                <div class="header-user__dropdown" id="userDropdown" role="menu">
                    <div class="dropdown-email" id="userEmail">cargando...</div>
                    <a href="/pages/general/settings/profile.html" class="dropdown-item" role="menuitem">
                        <img src="/assets/icons/configuracion.svg" alt="" class="dropdown-item__icon" />
                        Configuración
                    </a>
                    <div class="dropdown-separator"></div>
                    <button class="dropdown-item dropdown-item--danger" id="logoutBtn" type="button" role="menuitem">
                        <img src="/assets/icons/salir.svg" alt="" class="dropdown-item__icon" />
                        Cerrar sesión
                    </button>
                </div>
            </div>
        </div>
    </header>


    <!-- LAYOUT SETTINGS -->
    <div class="settings-layout">

        <!-- Sidebar -->
        <nav class="settings-sidebar">
            <p class="settings-sidebar__title">Configuración</p>
            <a href="/pages/general/settings/profile.html" class="settings-nav-link active">
                <!--<img src="../../../assets/icons/usuario.svg" alt="" />-->
                Mi Perfil
            </a>
            <a href="/pages/general/settings/security.html" class="settings-nav-link">
                <!--<img src="../../../assets/icons/candado.svg" alt="" />-->
                Seguridad
            </a>
        </nav>

        <!-- Contenido -->
        <div class="settings-content">
            <h2 class="settings-section-title">Mi Perfil</h2>
            <p class="settings-section-subtitle">Actualiza tu nombre, teléfono y dirección.</p>

            <div id="profile-message" class="settings-message" role="alert"></div>

            <form id="profileForm" class="settings-form">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="profileName">Nombre</label>
                        <div class="form-input-wrapper">
                            <!--<span class="form-input-icon icon-usuario" aria-hidden="true"></span>-->
                            <input type="text" id="profileName" class="form-input"
                                   placeholder="Tu nombre" minlength="2" maxlength="70" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileLastName">Apellido</label>
                        <div class="form-input-wrapper">
                            <!--<span class="form-input-icon icon-usuario" aria-hidden="true"></span>-->
                            <input type="text" id="profileLastName" class="form-input"
                                   placeholder="Tu apellido" minlength="2" maxlength="70" required />
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="profileEmail">Correo electrónico</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon icon-correo" aria-hidden="true"></span>
                        <input type="email" id="profileEmail" class="form-input" disabled
                               placeholder="correo@ejemplo.com" style="opacity:0.6;cursor:not-allowed" />
                    </div>
                    <span class="form-hint">El correo no puede cambiarse.</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="profilePhone">Teléfono</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon icon-telefono" aria-hidden="true"></span>
                        <input type="tel" id="profilePhone" class="form-input"
                               placeholder="Ej: 3001234567" minlength="7" maxlength="20" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="profileAddress">Dirección</label>
                    <div class="form-input-wrapper">
                        <span class="form-input-icon icon-direccion" aria-hidden="true"></span>
                        <input type="text" id="profileAddress" class="form-input"
                               placeholder="Ej: Calle 123 # 45-67, Bogotá" minlength="5" maxlength="200" />
                    </div>
                </div>

                <button type="submit" id="profileSubmitBtn" class="settings-submit">
                    Guardar cambios
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="/js/pages/general/settings/profile.js"></script>
    <!--<script type="module" src="/js/pages/citizen/dashboard.js"></script>-->
</body>
</html>
